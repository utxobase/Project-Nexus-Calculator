<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>₿ NEXUS // TERMINAL</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff5500">
    <link rel="icon" type="image/svg+xml" href="icon-192.svg">
    <link rel="apple-touch-icon" href="icon-192.svg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NEXUS">
</head>
<body>

<div class="container">
    <div class="header">
        <div class="btc-logo">
            <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" width="36" height="36">
                <rect width="64" height="64" rx="10" fill="#ff5500" opacity="0.15"/>
                <text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle"
                      font-size="42" fill="#ff5500" font-family="serif" font-weight="bold">₿</text>
            </svg>
        </div>
        <div class="header-text">
            <h2>SYSTEM:POSITION_CALC</h2>
            <div class="status-bar">STATUS: <span id="online-status">ONLINE</span></div>
        </div>
    </div>

    <div class="input-group">
        <label>RISK_AMOUNT (USD)</label>
        <input type="number" id="risk" placeholder="0.00" oninput="calculate()">
    </div>

    <div class="input-group">
        <label>STOP_LOSS (%)</label>
        <input type="number" id="sl" placeholder="0.00" oninput="calculate()">
    </div>

    <div class="input-group">
        <label>ENTRY_PRICE (USD)</label>
        <input type="number" id="entry" placeholder="0.00" oninput="calculate()">
    </div>

    <div class="result-panel">
        <div class="result-item">
            <span>POSITION_SIZE:</span>
            <span class="val" id="res-usd">$0.00</span>
        </div>
        <div class="result-item">
            <span>ASSET_QTY:</span>
            <span class="val" id="res-qty">0.0000</span>
        </div>
    </div>

    <button id="installBtn" class="btn-install">⬇ INSTALL_TO_SYSTEM</button>
    <div id="install-msg" class="install-msg"></div>

    <div class="footer-note">ENCRYPTED // OFFLINE_ENABLED // ₿ NEXUS v1.0</div>
</div>

<script src="script.js"></script>
</body>
</html>
